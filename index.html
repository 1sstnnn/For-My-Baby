<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For My Baby 💖</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:black;
      color:white;
      overflow-x:hidden;
    }

    h1{
      text-align:center;
      font-size:60px;
      margin-top:50px;
    }

    p{
      text-align:center;
      color:#ccc;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:30px;
      padding:50px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border-radius:30px;
      overflow:hidden;
      position:relative;
      transition:0.4s;
      box-shadow:0 0 30px rgba(255,0,255,0.3);
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:400px;
      object-fit:cover;
    }

    .caption{
      padding:20px;
      font-size:18px;
      background:linear-gradient(to top,black,transparent);
    }

    .heart{
      position:absolute;
      top:15px;
      right:20px;
      font-size:30px;
    }
  </style>
</head>

<body>

  <h1>Our Little Universe ✨</h1>

  <p>
    Every photo tells a tiny story about us.
  </p>

  <div class="gallery">

    <div class="card">
      <span class="heart">💖</span>
      <img src="foto1.jpg">
      <div class="caption">
        You make ordinary moments magical.
      </div>
    </div>

    <div class="card">
      <span class="heart">🌸</span>
      <img src="foto2.jpg">
      <div class="caption">
        Somewhere between chaos and comfort.
      </div>
    </div>

    <div class="card">
      <span class="heart">✨</span>
      <img src="foto3.jpg">
      <div class="caption">
        Tiny memories, giant feelings.
      </div>
    </div>

    <div class="card">
      <span class="heart">💫</span>
      <img src="foto4.jpg">
      <div class="caption">
        Your smile feels like home.
      </div>
    </div>

    <div class="card">
      <span class="heart">🌙</span>
      <img src="foto5.jpg">
      <div class="caption">
        Like moonlight wrapped in laughter.
      </div>
    </div>

    <div class="card">
      <span class="heart">💞</span>
      <img src="foto6.jpg">
      <div class="caption">
        Forever looks softer with you.
      </div>
    </div>

  </div>

</body>
</html>
